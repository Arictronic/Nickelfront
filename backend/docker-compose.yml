services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: nickelfront
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nickelfront"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python -m app.db.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/nickelfront
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=WIj45CLz2zvlNy7K22qLwU0Rxw1LmSztcm7h4hgy-1I
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/nickelfront
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=WIj45CLz2zvlNy7K22qLwU0Rxw1LmSztcm7h4hgy-1I
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/nickelfront
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=WIj45CLz2zvlNy7K22qLwU0Rxw1LmSztcm7h4hgy-1I
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/nickelfront
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=WIj45CLz2zvlNy7K22qLwU0Rxw1LmSztcm7h4hgy-1I
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
