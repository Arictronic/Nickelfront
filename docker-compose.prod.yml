version: '3.8'

# Docker Compose для развёртывания Nickelfront на сервере
# Все сервисы работают в общей сети и общаются по внутренним DNS именам

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nickelfront-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nickelfront
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nickelfront-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: nickelfront-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nickelfront-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nickelfront-backend
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nickelfront-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nickelfront-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info -E
    env_file:
      - .env.docker
    depends_on:
      - backend
      - redis
    networks:
      - nickelfront-network
    restart: unless-stopped

  # Celery Beat (периодические задачи)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nickelfront-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      - worker
    networks:
      - nickelfront-network
    restart: unless-stopped

  # Flower (мониторинг Celery)
  flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nickelfront-flower
    command: celery -A app.tasks.celery_app flower --port=5555
    env_file:
      - .env.docker
    ports:
      - "5555:5555"
    depends_on:
      - worker
    networks:
      - nickelfront-network
    restart: unless-stopped

  # Frontend + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nickelfront-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - nickelfront-network
    restart: unless-stopped

networks:
  nickelfront-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
