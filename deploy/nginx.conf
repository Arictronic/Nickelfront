# Nginx конфигурация для Nickelfront
# Скопируйте в /etc/nginx/sites-available/nickelfront (Linux)
# или используйте в Docker конфигурации

server {
    listen 80;
    server_name _;  # Замените на ваш домен или IP

    # Корневая директория frontend
    root /var/www/nickelfront/dist;
    index index.html;

    # Frontend статика
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy для API на backend
    location /api/ {
        proxy_pass http://localhost:8001/api/;
        proxy_http_version 1.1;
        
        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket поддержка (если понадобится)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
